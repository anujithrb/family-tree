<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Family Tree</title>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #0f1117; }
    svg#tree { display: block; width: 100vw; height: 100vh; cursor: grab; }
    svg#tree:active { cursor: grabbing; }
    #hint {
      position: fixed; bottom: 16px; left: 20px;
      color: #666; font: 12px/1 system-ui, sans-serif;
      pointer-events: none; user-select: none;
    }
    #ctx-menu {
      display: none; position: fixed; z-index: 100;
      background: #1a1d27; border: 1px solid #333; border-radius: 8px;
      padding: 6px 0; min-width: 180px;
      font: 13px/1 system-ui, sans-serif; color: #fff;
      box-shadow: 0 4px 16px rgba(0,0,0,0.5);
    }
    #ctx-menu button {
      display: block; width: 100%; padding: 8px 16px; border: none;
      background: none; color: #fff; text-align: left; cursor: pointer;
      font: inherit;
    }
    #ctx-menu button:hover:not(:disabled) { background: #2a2d3a; }
    #ctx-menu button:disabled { color: #555; cursor: default; }
    #ctx-menu .ctx-sep { border-top: 1px solid #333; margin: 4px 0; }
    #ctx-menu .ctx-confirm { padding: 10px 16px; font-size: 12px; color: #ccc; }
    #ctx-menu .ctx-confirm button { display: inline; width: auto; padding: 4px 10px;
      margin-top: 8px; margin-right: 6px; border-radius: 4px; }
    #ctx-menu .ctx-confirm .btn-danger { background: #7a1e1e; color: #fff; }
    #ctx-menu .ctx-confirm .btn-cancel { background: #333; color: #fff; }
    #ctx-menu .ctx-error { padding: 6px 16px; color: #f08080; font-size: 11px; }
    #modal-overlay {
  display: none; position: fixed; inset: 0; z-index: 200;
  background: rgba(0,0,0,0.6); align-items: center; justify-content: center;
}
#modal-overlay.open { display: flex; }
#modal-box {
  background: #1a1d27; border: 1px solid #333; border-radius: 10px;
  padding: 24px; width: 320px; font: 14px/1.5 system-ui, sans-serif; color: #fff;
}
#modal-box h2 { margin-bottom: 16px; font-size: 16px; }
#modal-box label { display: block; margin-bottom: 12px; color: #aaa; font-size: 12px; }
#modal-box input[type=text], #modal-box input[type=number] {
  display: block; width: 100%; margin-top: 4px; padding: 7px 10px;
  background: #0f1117; border: 1px solid #444; border-radius: 6px;
  color: #fff; font: inherit;
}
#modal-box .gender-row { display: flex; gap: 16px; margin-top: 4px; }
#modal-box .gender-row label { display: flex; align-items: center; gap: 6px;
  color: #fff; font-size: 13px; cursor: pointer; }
#modal-box .modal-actions { display: flex; gap: 10px; margin-top: 20px; justify-content: flex-end; }
#modal-box .modal-actions button {
  padding: 8px 18px; border: none; border-radius: 6px; cursor: pointer; font: inherit;
}
#modal-box .btn-primary { background: #2a5fa0; color: #fff; }
#modal-box .btn-secondary { background: #333; color: #fff; }
#modal-error { color: #f08080; font-size: 12px; margin-top: 10px; min-height: 16px; }
  </style>
</head>
<body>
  <svg id="tree"></svg>
  <div id="hint">Scroll to zoom · Drag to pan</div>
  <div id="ctx-menu">
    <button id="ctx-edit">Edit</button>
    <button id="ctx-add-spouse">Add Spouse</button>
    <button id="ctx-add-child">Add Child</button>
    <div class="ctx-sep"></div>
    <button id="ctx-remove">Remove</button>
    <div id="ctx-confirm-area"></div>
  </div>
  <div id="modal-overlay">
  <div id="modal-box">
    <h2 id="modal-title">Add Spouse</h2>
    <label>Name
      <input type="text" id="modal-name" placeholder="Full name">
    </label>
    <label>Birth year
      <input type="number" id="modal-birth" placeholder="e.g. 1990" min="1000" max="2100">
    </label>
    <label>Death year (optional)
      <input type="number" id="modal-death" placeholder="leave blank if living" min="1000" max="2100">
    </label>
    <label>Gender
      <div class="gender-row">
        <label><input type="radio" name="modal-gender" value="M"> Male</label>
        <label><input type="radio" name="modal-gender" value="F"> Female</label>
      </div>
    </label>
    <div id="modal-error"></div>
    <div class="modal-actions">
      <button class="btn-secondary" id="modal-cancel">Cancel</button>
      <button class="btn-primary"   id="modal-submit">Add</button>
    </div>
  </div>
</div>
  <script>
    // ===== STATE (populated by init) =====
    let people  = [];
    let couples = [];
    let personMap    = {};
    let personCouple = {};

    // ===== CONSTANTS =====
    const NODE_W      = 120;   // person card width
    const NODE_H      = 60;    // person card height
    const SPOUSE_GAP  = 12;    // gap between the two spouse cards
    const SUBTREE_GAP = 48;    // gap between sibling subtrees
    const ROW_HEIGHT  = 120;   // vertical distance between generation tops (NODE_H + VERTICAL_GAP)
    const VERTICAL_GAP = 60;   // space between bottom of parent row and top of child row
    const PADDING     = 40;    // canvas padding on all sides

    const C = {
      M: { fill:'#1e3a5f', stroke:'#2a5fa0', avatar:'#2a5fa0', years:'#aac8f0' },
      F: { fill:'#3d1f2e', stroke:'#a04a6a', avatar:'#a04a6a', years:'#f0c0d0' },
    };

    // ===== LAYOUT PASS 1: GENERATION ASSIGNMENT =====
    function assignGenerations() {
      const root = couples[0]; // c1 — the root ancestor couple
      root.gen = 0;
      const queue = [root];
      while (queue.length) {
        const couple = queue.shift();
        couple.children.forEach(childId => {
          const childCouple = personCouple[childId];
          if (childCouple && childCouple.gen === undefined) {
            childCouple.gen = couple.gen + 1;
            queue.push(childCouple);
          }
        });
      }
    }

    // ===== LAYOUT PASS 2: SUBTREE WIDTHS (bottom-up) =====
    function computeSubtreeWidths() {
      const COUPLE_W = NODE_W * 2 + SPOUSE_GAP; // 252px — minimum width for any couple

      const maxGen = Math.max(...couples.map(c => c.gen));

      for (let gen = maxGen; gen >= 0; gen--) {
        couples.filter(c => c.gen === gen).forEach(couple => {
          // Children who themselves form a couple (coupled children)
          const childCouples = couple.children
            .map(pid => personCouple[pid])
            .filter(Boolean);

          // Children who appear in no couple (solo leaf children)
          const soloCount = couple.children.filter(pid => !personCouple[pid]).length;
          const soloWidth = soloCount > 0
            ? soloCount * NODE_W + (soloCount - 1) * SUBTREE_GAP
            : 0;

          if (childCouples.length === 0) {
            // Leaf couple: at least couple unit width; expand if solo leaves need more
            couple.subtreeWidth = Math.max(COUPLE_W, soloWidth || COUPLE_W);
          } else {
            const coupledWidth = childCouples.reduce((s, cc) => s + cc.subtreeWidth, 0)
              + (childCouples.length - 1) * SUBTREE_GAP;
            // When solo leaves also exist, reserve space for them side-by-side
            couple.subtreeWidth = soloWidth > 0
              ? coupledWidth + SUBTREE_GAP + soloWidth
              : coupledWidth;
          }
        });
      }
    }

    // ===== LAYOUT PASS 3: X/Y POSITIONS (top-down) =====
    function computePositions() {
      const root = couples[0];
      root.cx = root.subtreeWidth / 2 + PADDING;

      const queue = [root];
      while (queue.length) {
        const couple = queue.shift();

        // Y from generation
        couple.y    = couple.gen * ROW_HEIGHT + PADDING;
        couple.yBot = couple.y + NODE_H;

        // Spouse card left edges (cards touch the gap, no overlap)
        couple.spouseAX = couple.cx - SPOUSE_GAP / 2 - NODE_W;
        couple.spouseBX = couple.cx + SPOUSE_GAP / 2;

        // Position all children (coupled + solo leaves) as one combined left-to-right block
        const childCouples = couple.children
          .map(pid => personCouple[pid])
          .filter(Boolean);
        const soloIds = couple.children.filter(pid => !personCouple[pid]);

        if (childCouples.length > 0 || soloIds.length > 0) {
          const totalCoupledW = childCouples.length > 0
            ? childCouples.reduce((s, cc) => s + cc.subtreeWidth, 0)
              + (childCouples.length - 1) * SUBTREE_GAP
            : 0;
          const totalSoloW = soloIds.length > 0
            ? soloIds.length * NODE_W + (soloIds.length - 1) * SUBTREE_GAP
            : 0;
          const gap = (childCouples.length > 0 && soloIds.length > 0) ? SUBTREE_GAP : 0;
          const totalW = totalCoupledW + gap + totalSoloW;

          let x = couple.cx - totalW / 2;

          childCouples.forEach(cc => {
            cc.cx = x + cc.subtreeWidth / 2;
            x += cc.subtreeWidth + SUBTREE_GAP;
            queue.push(cc);
          });

          if (soloIds.length > 0) {
            const soloGen = couple.gen + 1;
            // After the coupled loop, x already includes the trailing SUBTREE_GAP
            // which serves as the gap between the two sections — correct as-is
            soloIds.forEach(pid => {
              const p = personMap[pid];
              p.soloX  = x;
              p.soloY  = soloGen * ROW_HEIGHT + PADDING;
              p.soloCX = x + NODE_W / 2;
              x += NODE_W + SUBTREE_GAP;
            });
          }
        }
      }
    }

    // ===== RENDER =====
    let svg, zoomLayer, connectorLayer, nodeLayer;

    function yearsLabel(p) {
      return p.death ? `${p.birth}–${p.death}` : `b. ${p.birth}`;
    }

    // ===== CONTEXT MENU =====
    let ctxTarget = null; // { person, coupleId }
    let ctxInflight = false;

    const ctxMenu        = document.getElementById('ctx-menu');
    const ctxEdit        = document.getElementById('ctx-edit');
    const ctxAddSpouse   = document.getElementById('ctx-add-spouse');
    const ctxAddChild    = document.getElementById('ctx-add-child');
    const ctxRemove      = document.getElementById('ctx-remove');
    const ctxConfirmArea = document.getElementById('ctx-confirm-area');

    function hideCtxMenu() {
      if (ctxInflight) return;
      ctxMenu.style.display = 'none';
      ctxConfirmArea.innerHTML = '';
      ctxTarget = null;
    }

    document.addEventListener('click', hideCtxMenu);
    ctxMenu.addEventListener('click', e => e.stopPropagation());

    function showCtxMenu(event, d) {
      ctxTarget = d;
      ctxConfirmArea.innerHTML = '';

      // Determine state
      const personId = d.person.id;
      const myCouple = couples.find(c => c.spouseA === personId || c.spouseB === personId);
      const hasCouple = !!myCouple;
      const hasChildren = hasCouple && myCouple.children.length > 0;
      const isSpouseA = hasCouple && myCouple.spouseA === personId;

      // Add Spouse — only if no couple
      ctxAddSpouse.disabled = hasCouple;
      ctxAddSpouse.title = hasCouple ? 'Already has a spouse' : '';

      // Add Child — only if in a couple
      ctxAddChild.disabled = !hasCouple;
      ctxAddChild.title = !hasCouple ? 'Add a spouse first' : '';

      // Remove — disabled if couple has children
      ctxRemove.disabled = hasChildren;
      ctxRemove.title = hasChildren ? 'Cannot remove a person with children' : '';

      // Position menu
      const x = Math.min(event.clientX, window.innerWidth  - 200);
      const y = Math.min(event.clientY, window.innerHeight - 200);
      ctxMenu.style.left    = x + 'px';
      ctxMenu.style.top     = y + 'px';
      ctxMenu.style.display = 'block';
    }

    ctxAddSpouse.addEventListener('click', () => {
      if (!ctxTarget) return;
      openModal('spouse', ctxTarget);
      hideCtxMenu();
    });

    ctxEdit.addEventListener('click', () => {
      if (!ctxTarget) return;
      openModal('edit', ctxTarget);
      hideCtxMenu();
    });

    ctxAddChild.addEventListener('click', () => {
      if (!ctxTarget) return;
      openModal('child', ctxTarget);
      hideCtxMenu();
    });

    ctxRemove.addEventListener('click', () => {
      if (!ctxTarget || ctxRemove.disabled) return;
      const d = ctxTarget;
      const personId = d.person.id;
      const myCouple = couples.find(c => c.spouseA === personId || c.spouseB === personId);
      const isSpouseA = myCouple && myCouple.spouseA === personId;
      const spouseBName = isSpouseA ? personMap[myCouple.spouseB]?.name : null;

      let msg = `Remove ${d.person.name}?`;
      if (isSpouseA && spouseBName) msg += ` This will also remove their spouse ${spouseBName}.`;
      else if (myCouple) msg += ` Their couple will be dissolved.`;
      msg += ' This cannot be undone.';

      ctxConfirmArea.innerHTML = `
        <div class="ctx-confirm">
          <div>${msg}</div>
          <button class="btn-danger" id="ctx-confirm-yes">Confirm</button>
          <button class="btn-cancel" id="ctx-confirm-no">Cancel</button>
        </div>`;

      document.getElementById('ctx-confirm-no').addEventListener('click', hideCtxMenu);
      document.getElementById('ctx-confirm-yes').addEventListener('click', async () => {
        ctxInflight = true;
        ctxConfirmArea.innerHTML = '<div class="ctx-confirm">Removing…</div>';
        try {
          const res = await fetch(`/api/people/${personId}`, { method: 'DELETE' });
          const body = await res.json();
          if (!res.ok) throw new Error(body.error || 'Request failed');
          await init();
          ctxInflight = false;
          hideCtxMenu();
        } catch (err) {
          ctxInflight = false;
          ctxConfirmArea.innerHTML = `
            <div class="ctx-confirm">
              <div class="ctx-error">${err.message}</div>
              <button class="btn-cancel" id="ctx-confirm-no">Close</button>
            </div>`;
          document.getElementById('ctx-confirm-no').addEventListener('click', hideCtxMenu);
        }
      });
    });

    // ===== MODAL =====
    const modalOverlay = document.getElementById('modal-overlay');
    const modalTitle   = document.getElementById('modal-title');
    const modalName    = document.getElementById('modal-name');
    const modalBirth   = document.getElementById('modal-birth');
    const modalDeath   = document.getElementById('modal-death');
    const modalError   = document.getElementById('modal-error');
    const modalSubmit  = document.getElementById('modal-submit');
    let modalContext   = null; // { mode: 'spouse'|'child', target: d }

    function openModal(mode, d) {
      modalContext = { mode, target: d };
      modalTitle.textContent = mode === 'spouse' ? 'Add Spouse' : 'Add Child';
      modalName.value  = '';
      modalBirth.value = '';
      modalDeath.value = '';
      document.querySelectorAll('input[name="modal-gender"]').forEach(r => r.checked = false);
      modalError.textContent = '';
      modalOverlay.classList.add('open');
      modalName.focus();
    }

    function closeModal() {
      modalOverlay.classList.remove('open');
      modalContext = null;
    }

    document.getElementById('modal-cancel').addEventListener('click', closeModal);
    modalOverlay.addEventListener('click', e => { if (e.target === modalOverlay) closeModal(); });

    modalSubmit.addEventListener('click', async () => {
      if (!modalContext) return;
      modalError.textContent = '';

      const name   = modalName.value.trim();
      const birth  = parseInt(modalBirth.value, 10);
      const death  = modalDeath.value ? parseInt(modalDeath.value, 10) : null;
      const gender = document.querySelector('input[name="modal-gender"]:checked')?.value;

      if (!name)            { modalError.textContent = 'Name is required.'; return; }
      if (!birth)           { modalError.textContent = 'Birth year is required.'; return; }
      if (birth < 1000 || birth > 2100) { modalError.textContent = 'Birth year must be between 1000 and 2100.'; return; }
      if (death !== null && death < birth) { modalError.textContent = 'Death year must be ≥ birth year.'; return; }
      if (!gender)          { modalError.textContent = 'Gender is required.'; return; }

      const personData = { name, birth, death, gender };
      const { mode, target } = modalContext;

      try {
        modalSubmit.disabled = true;
        let res;
        if (mode === 'spouse') {
          res = await fetch('/api/couples', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ existingPersonId: target.person.id, spouse: personData }),
          });
        } else {
          const coupleId = target.coupleId;
          res = await fetch(`/api/couples/${coupleId}/children`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(personData),
          });
        }

        const body = await res.json();
        if (!res.ok) throw new Error(body.error || 'Request failed');

        closeModal();
        await init();
      } catch (err) {
        modalError.textContent = err.message;
      } finally {
        modalSubmit.disabled = false;
      }
    });

    function renderNodes() {
      // Build flat list: all coupled people + all solo leaf people
      const nodeData = [];

      couples.forEach(couple => {
        nodeData.push({ person: personMap[couple.spouseA], x: couple.spouseAX, y: couple.y, coupleId: couple.id });
        nodeData.push({ person: personMap[couple.spouseB], x: couple.spouseBX, y: couple.y, coupleId: couple.id });
      });

      people
        .filter(p => p.soloX !== undefined)
        .forEach(p => nodeData.push({ person: p, x: p.soloX, y: p.soloY }));

      const groups = nodeLayer
        .selectAll('g.person')
        .data(nodeData, d => d.person.id)
        .join('g')
        .attr('class', 'person')
        .attr('transform', d => `translate(${d.x},${d.y})`);

      groups.on('click', function(event, d) {
        event.stopPropagation();
        showCtxMenu(event, d);
      });

      // Define per-node clip path so content stays within card bounds
      groups.append('clipPath')
        .attr('id', d => `clip-${d.person.id}`)
        .append('rect')
        .attr('width', NODE_W)
        .attr('height', NODE_H)
        .attr('rx', 8);

      // Inner group clipped to card bounds
      const inner = groups.append('g')
        .attr('clip-path', d => `url(#clip-${d.person.id})`);

      // Background card — append to inner
      inner.append('rect')
        .attr('width', NODE_W)
        .attr('height', NODE_H)
        .attr('rx', 8)
        .attr('fill',   d => C[d.person.gender].fill)
        .attr('stroke', d => C[d.person.gender].stroke)
        .attr('stroke-width', 1.5);

      // Avatar circle — append to inner
      inner.append('circle')
        .attr('cx', 22)
        .attr('cy', NODE_H / 2)
        .attr('r', 18)
        .attr('fill', d => C[d.person.gender].avatar);

      // Initial letter in avatar — append to inner
      inner.append('text')
        .attr('x', 22)
        .attr('y', NODE_H / 2)
        .attr('text-anchor', 'middle')
        .attr('dominant-baseline', 'central')
        .attr('fill', '#ffffff')
        .attr('font-size', '15px')
        .attr('font-weight', '700')
        .attr('font-family', 'system-ui, sans-serif')
        .text(d => d.person.name[0]);

      // Name — append to inner
      inner.append('text')
        .attr('x', 46)
        .attr('y', NODE_H / 2 - 9)
        .attr('fill', '#ffffff')
        .attr('font-size', '12px')
        .attr('font-weight', '600')
        .attr('font-family', 'system-ui, sans-serif')
        .text(d => d.person.name);

      // Years — append to inner
      inner.append('text')
        .attr('x', 46)
        .attr('y', NODE_H / 2 + 9)
        .attr('fill', d => C[d.person.gender].years)
        .attr('font-size', '10px')
        .attr('font-family', 'system-ui, sans-serif')
        .text(d => yearsLabel(d.person));
    }

    function renderConnectors() {
      const lines = [];

      couples.forEach(couple => {
        // 1. Horizontal spouse connector (right edge of spouseA → left edge of spouseB)
        lines.push({
          x1: couple.spouseAX + NODE_W,
          y1: couple.y + NODE_H / 2,
          x2: couple.spouseBX,
          y2: couple.y + NODE_H / 2,
        });

        // 2. Child connectors
        const childCouples = couple.children
          .map(pid => personCouple[pid])
          .filter(Boolean);
        const soloIds = couple.children.filter(pid => !personCouple[pid]);

        const allChildren = [
          ...childCouples.map(cc => {
            const childIsSpouseA = couple.children.includes(cc.spouseA);
            const childCardCX = childIsSpouseA
              ? cc.spouseAX + NODE_W / 2
              : cc.spouseBX + NODE_W / 2;
            return { cx: childCardCX, y: cc.y };
          }),
          ...soloIds.map(pid => {
            const p = personMap[pid];
            return { cx: p.soloCX, y: p.soloY };
          }),
        ];

        if (allChildren.length === 0) return;

        const yBot = couple.yBot;
        const midY = yBot + VERTICAL_GAP / 2;
        const cxs  = allChildren.map(c => c.cx);
        const minCX = Math.min(...cxs);
        const maxCX = Math.max(...cxs);

        // Drop from couple midpoint down to midY
        lines.push({ x1: couple.cx, y1: yBot,  x2: couple.cx, y2: midY });

        // Horizontal bar: across all children when >1, or elbow when single child is offset
        if (allChildren.length > 1) {
          lines.push({ x1: minCX, y1: midY, x2: maxCX, y2: midY });
        } else if (allChildren.length === 1 && Math.abs(allChildren[0].cx - couple.cx) > 0.5) {
          lines.push({ x1: couple.cx, y1: midY, x2: allChildren[0].cx, y2: midY });
        }

        // Vertical drops from bar to each child top
        allChildren.forEach(child => {
          lines.push({ x1: child.cx, y1: midY, x2: child.cx, y2: child.y });
        });
      });

      connectorLayer
        .selectAll('line.connector')
        .data(lines)
        .join('line')
        .attr('class', 'connector')
        .attr('x1', d => d.x1).attr('y1', d => d.y1)
        .attr('x2', d => d.x2).attr('y2', d => d.y2)
        .attr('stroke', '#aaaaaa')
        .attr('stroke-width', 1.5);
    }

    // ===== ZOOM + PAN =====
    let zoom; // stored so re-renders can restore the transform

    function setupZoom(treeW, treeH) {
      const vw = window.innerWidth;
      const vh = window.innerHeight;
      const scale      = Math.min(treeW > vw ? vw / treeW : 1, treeH > vh ? vh / treeH : 1);
      const translateX = (vw - treeW * scale) / 2;
      const translateY = PADDING * scale;

      const initialTransform = d3.zoomIdentity.translate(translateX, translateY).scale(scale);

      zoom = d3.zoom()
        .scaleExtent([0.2, 3])
        .on('zoom', event => { zoomLayer.attr('transform', event.transform); });

      svg.call(zoom).call(zoom.transform, initialTransform);
    }

    // ===== INIT =====
    async function init() {
      // Save viewport position across re-renders
      const prevTransform = (svg && zoom) ? d3.zoomTransform(svg.node()) : null;

      // Fetch tree data
      const res = await fetch('/api/tree');
      if (!res.ok) { console.error('Failed to load tree:', res.status); return; }
      const data = await res.json();
      people  = data.people;
      couples = data.couples;

      // Rebuild helper maps from fresh data
      personMap = Object.fromEntries(people.map(p => [p.id, p]));
      personCouple = {};
      couples.forEach(c => { personCouple[c.spouseA] = c; personCouple[c.spouseB] = c; });

      // Set up SVG layers once
      if (!svg) {
        svg           = d3.select('#tree');
        zoomLayer     = svg.append('g').attr('class', 'zoom-layer');
        connectorLayer = zoomLayer.append('g').attr('class', 'connectors');
        nodeLayer     = zoomLayer.append('g').attr('class', 'nodes');
      }

      // Guard: nothing to render if tree is empty (pre-seed or fully cleared)
      if (couples.length === 0) {
        if (svg) {
          connectorLayer.selectAll('*').remove();
          nodeLayer.selectAll('*').remove();
        }
        return;
      }

      // Layout passes
      assignGenerations();
      computeSubtreeWidths();
      computePositions();

      // Clear and re-render
      connectorLayer.selectAll('*').remove();
      nodeLayer.selectAll('*').remove();
      renderConnectors();
      renderNodes();

      // Zoom: fit on first load, restore on re-render
      const maxGen = Math.max(...couples.map(c => c.gen));
      const treeW  = couples[0].subtreeWidth + PADDING * 2;
      const treeH  = (maxGen + 1) * ROW_HEIGHT + PADDING * 2;

      if (!zoom) {
        setupZoom(treeW, treeH);
      } else {
        svg.call(zoom.transform, prevTransform);
      }
    }

    init();
  </script>
</body>
</html>
